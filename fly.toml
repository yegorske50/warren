# Warren on Fly.io (SPEC §10.2).
#
# `fly launch` reads this file. The Machine inherits the same image used
# for `docker compose up`; Fly Machines are Firecracker VMs, so the four
# bwrap security overrides (which a managed K8s cluster would refuse) are
# applied at the Machine level here.
#
# Operator workflow:
#   fly launch                  # creates the app from this fly.toml
#   fly volumes create warren_data --size 50 --region sjc
#   BURROW_TOKEN=$(openssl rand -hex 32)
#   fly secrets set \
#       WARREN_API_TOKEN=$(openssl rand -hex 32) \
#       BURROW_API_TOKEN=$BURROW_TOKEN \
#       WARREN_BURROW_TOKEN=$BURROW_TOKEN \
#       ANTHROPIC_API_KEY=... \
#       GITHUB_TOKEN=...
#   # Optional — only if you want a custom canopy agent library on top
#   # of the built-in claude-code + sapling agents:
#   #     fly secrets set CANOPY_REPO_URL=https://github.com/<you>/agents.git
#   # Optional — attach a managed Postgres instead of the on-volume
#   # SQLite (R-13, shipped 2026-05-14). Without this, warren falls back
#   # to sqlite:///data/warren.db on the warren_data volume. Use this
#   # path when an SRE team operates warren state in their own Postgres
#   # (e.g., Fly Postgres, RDS, Supabase) rather than a docker volume.
#   #     fly secrets set WARREN_DB_URL=postgres://user:pw@host/db
#   # Optional — error tracking (warren observability Phase 1). Unset =
#   # no Sentry overhead; set the DSN to capture unhandled exceptions,
#   # 500-path errors, and error-level log lines. SENTRY_ENVIRONMENT
#   # (default "production") + SENTRY_RELEASE are optional.
#   #     fly secrets set SENTRY_DSN=https://...@oXXXX.ingest.sentry.io/XXXX
#   fly deploy
#
# Metrics: the `[[metrics]]` block below makes Fly's managed Prometheus
# scrape warren's auth-exempt `GET /metrics` endpoint (run/cost/token
# gauges + warn/error log-rate counters). Machine-level metrics (CPU,
# mem, restarts) are scraped automatically with no config. Dashboards
# live in Fly's hosted Grafana at https://fly-metrics.net.
#
# BURROW_API_TOKEN (read by `burrow serve`) and WARREN_BURROW_TOKEN
# (read by warren's burrow-client) MUST be set to the same value —
# warren talks to burrow over the unix socket with bearer auth, and
# a missing/mismatched pair surfaces as 401 "missing Authorization
# header" on every dispatch. WARREN_API_TOKEN is the browser-facing
# token (paste it into the UI's login screen).
#
# After deploy, the warren UI is reachable at https://<app>.fly.dev.

app = "warren-deployed"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  WARREN_DATA_DIR = "/data"
  # Pin burrow's SQLite + archive + projects dir onto the warren_data
  # volume. Without this, burrow falls back to XDG_DATA_HOME (the
  # container's ephemeral overlay) and every redeploy wipes the run state
  # of any in-flight burrow, orphaning warren's still-'running' rows
  # (warren-0375). Mirrors the Dockerfile ENV so it's visible at the
  # deploy-config layer too.
  BURROW_DATA_DIR = "/data/burrow"
  WARREN_BIND_HOST = "0.0.0.0"
  WARREN_BIND_PORT = "8080"
  # Enable the send-off PR-merge poller (warren-b872): once a leveret
  # conversation's plot-sync PR merges, auto-dispatch the planner run
  # keyed on plot_id. Without this the conversation -> planner half of
  # the happy path silently stalls and operators must hand-dispatch the
  # planner (which then never links back to the conversation).
  WARREN_MERGE_POLLER_ENABLED = "1"
  # Run heartbeat watchdog (warren-285d): force-fail a `running` run that
  # goes silent-but-busy past this budget (newest event / started_at
  # older than the timeout), reaping it `failed` (timed_out) so the burrow
  # workspace + runaway bwrap tree is torn down instead of pinning CPU
  # forever. On by default in code (warren-b2dc) with a 45-min built-in
  # budget; pinned explicitly here so the deploy-config layer is the
  # source of truth. Opt out with WARREN_WATCHDOG_DISABLED=1.
  WARREN_RUN_HEARTBEAT_TIMEOUT_MS = "2700000"

[[mounts]]
  source = "warren_data"
  destination = "/data"

# Fly's managed Prometheus scrapes this over the private network. The
# endpoint is auth-exempt (aggregate counts + counters only, no secrets),
# mirroring /healthz. Dashboards: https://fly-metrics.net.
[[metrics]]
  port = 8080
  path = "/metrics"

# Warren is single-instance: one Machine, one persistent volume. Deploys
# bounce the supervisor (which restarts both children); the volume keeps
# warren.db (SQLite default), canopy clone, project clones, AND burrow's
# own SQLite + archive/ + projects/ under /data/burrow (BURROW_DATA_DIR)
# across deploys. Without the burrow pin, every redeploy wiped burrow's
# state and orphaned warren rows still marked 'running' (warren-0375).
# When WARREN_DB_URL points at an external Postgres, warren.db is unused
# — the volume still holds canopy + project clones + burrow's data, so
# the mount stays in place either way.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/healthz"

# Bwrap inside a Fly Machine needs the same overrides as a Linux host
# does inside a managed container. `unprivileged_userns` is on by default
# on Fly's machine kernels; the four overrides below match docker-compose
# so the same image works without a posture change.
[experimental]
  enable_consul = false

[[vm]]
  cpu_kind = "performance"
  cpus = 4
  memory = "8gb"

# NOTE: Fly's TOML schema doesn't have first-class fields for the four
# bwrap flags (apparmor / seccomp / systempaths / SYS_ADMIN). Fly
# Machines run on Firecracker — they're a VM, not a container — so
# bwrap nests without any of those overrides on a stock Machine kernel.
# The container-only flags in docker-compose.yml are not needed here.
# See burrow/DEPLOY.md "Reference Fly Machine config" for the rationale.
