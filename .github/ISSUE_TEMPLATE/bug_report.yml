name: Bug Report
description: Report a bug in warren
labels: ["type/bug", "status/needs-triage"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do?
      placeholder: |
        1. Run `wr ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: |
        How urgent is this for you? Maintainers may re-triage, but a starting
        point helps. See `docs/labels.md` for the full priority taxonomy.
      options:
        - "P0 -- critical / production-impacting"
        - "P1 -- high / blocks my workflow"
        - "P2 -- medium / annoying but workable"
        - "P3 -- low / nice-to-have"
      default: 2
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: |
        Which part of warren does this touch? Pick the closest match; leave
        as "unsure" if you don't know and a maintainer will label it during
        triage.
      multiple: true
      options:
        - "area/server -- HTTP API / handlers"
        - "area/ui -- React SPA"
        - "area/cli -- CLI commands"
        - "area/supervisor -- supervisor process"
        - "area/burrow -- sandbox / burrow boundary"
        - "area/db -- storage / migrations"
        - "area/agents -- agent registry / built-ins"
        - "area/runs -- run lifecycle / events"
        - "area/projects -- project management"
        - "area/plot -- Plot integration"
        - "area/plan-runs -- serial plan dispatch"
        - "area/preview -- preview environments"
        - "area/scheduler -- cron / triggers"
        - "area/acceptance -- acceptance harness"
        - "area/build -- CI / lint / tooling"
        - "area/docs -- documentation"
        - "unsure -- maintainer will triage"
    validations:
      required: true

  - type: input
    id: warren-version
    attributes:
      label: warren version
      description: Output of `wr --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`
      placeholder: "1.2.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 22.04, etc."
    validations:
      required: true

  - type: input
    id: deployment
    attributes:
      label: Deployment mode
      description: How is warren running?
      placeholder: "docker compose, fly.io, local bun, etc."
    validations:
      required: false
