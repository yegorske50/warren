name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "CHANGELOG.md"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release: ${{ steps.version-check.outputs.release }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test

      - name: Check if version is unreleased
        id: version-check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          if git ls-remote --exit-code --tags origin "v$LOCAL_VERSION" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$LOCAL_VERSION already exists; skipping release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
            echo "Releasing v$LOCAL_VERSION."
          fi

      - name: Verify version sync
        if: steps.version-check.outputs.release == 'true'
        run: |
          PKG_VERSION="${{ steps.version-check.outputs.version }}"
          SRC_VERSION=$(grep -oP 'const VERSION = "\K[^"]+' src/index.ts)
          if [ "$PKG_VERSION" != "$SRC_VERSION" ]; then
            echo "::error::Version mismatch! package.json=$PKG_VERSION src/index.ts=$SRC_VERSION"
            exit 1
          fi

      - name: Tag release
        if: steps.version-check.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git rev-parse --verify "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists locally; skipping create"
          else
            git tag -a "v$VERSION" -m "v$VERSION"
          fi
          if git ls-remote --exit-code --tags origin "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already on remote; skipping push"
          else
            git push origin "v$VERSION"
          fi

      - name: Extract changelog notes
        if: steps.version-check.outputs.release == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          NOTES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          NOTES=$(echo "$NOTES" | awk 'NF{found=1} found{lines[++n]=$0} END{while(n>0 && lines[n]=="") n--; for(i=1;i<=n;i++) print lines[i]}')
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Warning: No CHANGELOG entry found for $VERSION"
          fi

      - name: Create GitHub release
        if: steps.version-check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; skipping"
            exit 0
          fi
          if [ "${{ steps.changelog.outputs.found }}" = "true" ]; then
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --generate-notes
          fi

  deploy:
    needs: release
    if: needs.release.outputs.release == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-warren-deployed
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app warren-deployed
