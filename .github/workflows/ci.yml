name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run validate:agents-md
      - run: bun run check:file-sizes
      - run: bun run check:debt-markers
      - run: bun run check:duplicates
      - run: bun run ui:install
      - run: bun run check:deps
      - run: bun run build:ui
      - run: bun run check:bundle-size
      - name: Run tests with coverage + JUnit reporter
        run: bun run check:coverage:ci

      - name: Test timing summary
        if: always()
        run: bun run report:test-timing

      - name: Code-quality metrics summary
        if: always()
        run: bun run report:quality-metrics

      - name: Upload test timing artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bun-test-junit
          path: test-results/junit.xml
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bun-test-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
