name: auto-merge

# Enable GitHub's auto-merge on PRs authored by the repo owner so they
# merge as soon as the `ci` required check passes. Other authors' PRs
# still run CI but require a manual `gh pr merge` (or click). Squash is
# the chosen merge method — keeps main history linear, drops the
# burrow/run_xxx branch noise from agent-opened PRs.
#
# Uses AUTO_MERGE_PAT (not GITHUB_TOKEN) so that the resulting push to
# main triggers downstream workflows (CI, Release). GITHUB_TOKEN-authored
# pushes are deliberately suppressed by GitHub to prevent recursive loops.
# See seed warren-a2dc.

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == github.repository_owner
    steps:
      # docs/CONSTITUTION.md Article IX: changes to the constitution, the
      # audit triggers, project-tier agent prompts, or this workflow itself
      # must be merged by a human — never auto-merge. This step is the
      # executable form of that article.
      - name: Article IX check (constitution-protected paths)
        id: protected
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          PROTECTED='^(docs/CONSTITUTION\.md|\.warren/triggers\.yaml|\.canopy/|\.github/workflows/auto-merge\.yml)'
          CHANGED=$(gh pr view "$PR_URL" --json files -q '.files[].path')
          if echo "$CHANGED" | grep -qE "$PROTECTED"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "Article IX: protected paths changed — auto-merge will NOT be enabled:"
            echo "$CHANGED" | grep -E "$PROTECTED"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Enable auto-merge (squash)
        if: steps.protected.outputs.hit == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
