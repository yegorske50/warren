# Warren home-server compose file (SPEC §10.1).
#
# `docker compose up -d` boots a single warren container with:
#   - the four bwrap-friendly security flags (SPEC §5.3 / mx-94901b /
#     mx-c085ba). They relax the outer container so burrow's nested
#     userns sandboxes can come up.
#   - a named volume mounted at /data for warren.db (SQLite default),
#     the canopy clone, and cloned project repos. When WARREN_DB_URL
#     points at an external Postgres (R-13, shipped 2026-05-14),
#     warren.db is unused but the volume still holds canopy + project
#     clones, so the mount stays in place either way.
#   - the runtime env loaded from .env (`cp .env.example .env` first).
#
# The supervisor inside the container spawns `burrow serve` and `warren`
# as siblings — there is no separate burrow service in compose. See
# SPEC §10.3 for the supervisor contract and src/supervisor/main.ts for
# the implementation.

services:
  warren:
    build:
      context: .
      dockerfile: Dockerfile
    image: warren:local
    container_name: warren
    restart: unless-stopped

    # Required for nested bwrap (SPEC §5.3, mx-94901b/mx-c085ba). Remove
    # any one of these and `burrow up` fails inside the container.
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
      - systempaths=unconfined
    cap_add:
      - SYS_ADMIN

    ports:
      - "8080:8080"

    # Cap and rotate container logs (warren-26c2 / pl-f700 step 4) so the
    # per-request access log can't fill the host disk. json-file is the
    # default driver; the options bound each file to 10MB and keep 5
    # rotated files (50MB ceiling per container).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    env_file:
      - .env

    volumes:
      - warren_data:/data
      # Local-dev bind mount so warren can clone a host-side canopy repo
      # via `CANOPY_REPO_URL=file:///canopy-source`. Read-only — warren
      # only ever reads from this path; clones land under /data.
      # CANOPY_REPO_URL itself is optional (warren-d3e9: built-in agents
      # cover the common case); only set CANOPY_SOURCE_DIR if you're
      # pointing CANOPY_REPO_URL at file:///canopy-source for local dev.
      # Defaults to /dev/null so the mount is harmless when unset.
      - ${CANOPY_SOURCE_DIR:-/dev/null}:/canopy-source:ro

volumes:
  warren_data:
