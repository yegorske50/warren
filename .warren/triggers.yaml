# .warren/triggers.yaml — scheduled runs for this project (SPEC §11.I, R-06).
#
# Each entry is a cron-style trigger. Warren ticks once a minute and
# spawns a run when a trigger is due. Today only `kind: cron` is
# implemented; the `kind:` discriminator leaves room for future
# webhook-style triggers without a breaking schema rev.
#
# Required fields: id, kind, cron, role.
# Optional fields: seed, timezone (default UTC), prompt.
#
# Field rules (TriggersConfigSchema in src/warren-config/schema.ts):
#   id        kebab/snake-case (lowercase, digits, dots, dashes, _). Unique.
#   kind      'cron'
#   cron      5 or 6 whitespace-separated fields (croner-compatible)
#   seed      seed id the agent reads + writes (e.g. warren-xxxx)
#   role      registered agent name (kebab/snake-case)
#   timezone  IANA tz name, e.g. America/Los_Angeles
#   prompt    pre-filled into the agent; multi-line ok via `|`
#
# Example (uncomment to enable):
#
# - id: nightly-housekeeping
#   kind: cron
#   cron: '0 3 * * *'          # 03:00 daily
#   seed: warren-housekeep
#   role: claude-code
#   timezone: America/Los_Angeles
#   prompt: |
#     Run the housekeeping checklist and file seeds for anything off.

- id: nightwatch-patrol
  kind: cron
  cron: '0 2 * * *'
  role: nightwatch
  timezone: America/Los_Angeles
  prompt: |
    Scan this repo for quality issues. Follow your procedure exactly.
    Today's date is {{date}}. If you find issues, file a plan. If the
    codebase is clean, report clean and exit.

- id: bugwatch-triage
  kind: cron
  cron: '0 5 * * 0,3'
  role: bugwatch
  timezone: America/Los_Angeles
  prompt: |
    Triage open bug seeds and plan fixes. Follow your procedure exactly.
    Today's date is {{date}}. If no bugs qualify, report clean and exit.

# Audit population (docs/CONSTITUTION.md). gatewatch + ratchetwatch are
# mechanical auditors with plan+dispatch authority (auto_plan_run);
# tastewatch is the report-only taste auditor — its weekly digest seed is
# the human's five-minute calibration read. Article IX: changes to these
# entries require explicit human review.

- id: gatewatch-patrol
  kind: cron
  cron: '10 3 * * *'
  role: gatewatch
  timezone: America/Los_Angeles
  prompt: |
    Audit the last 36 hours of merged history for gate-integrity
    violations per docs/CONSTITUTION.md. Follow your procedure exactly.
    Today's date is {{date}}. Dedupe against open audit seeds before
    filing. If the window is clean, report clean and exit.

- id: ratchetwatch-patrol
  kind: cron
  cron: '40 3 * * *'
  role: ratchetwatch
  timezone: America/Los_Angeles
  prompt: |
    Measure ratchet slack (coverage floors, grandfather lists, bundle
    creep, debt markers) per docs/CONSTITUTION.md Article II and plan
    mechanical tightenings only. Follow your procedure exactly. Today's
    date is {{date}}. If everything is tight, report tight and exit.

- id: tastewatch-digest
  kind: cron
  cron: '0 4 * * 0'
  role: tastewatch
  timezone: America/Los_Angeles
  prompt: |
    Produce the weekly taste digest: stratified sample of the week's
    merged commits judged against docs/CONSTITUTION.md, auditor
    precision table, divergence trend, at most one proposed amendment.
    Exactly one digest seed. Today's date is {{date}}.
