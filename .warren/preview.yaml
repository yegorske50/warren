# .warren/preview.yaml — per-run preview environment (warren-5840, SPEC §11.L).
#
# The top-level document IS the preview block (no `preview:` wrapper key).
# Uncomment the block below to enable per-run previews. Until you do,
# warren skips the reap-time preview launch sub-step (this is a no-op).
#
# Schema lives at PreviewConfigSchema in src/warren-config/schema.ts.
# Launcher: src/preview/launch.ts. Eviction: src/preview/eviction.ts.
#
# --- Reachability: bind your dev server to 0.0.0.0 (warren-79b2) ----------
# Burrow's inbound forwarder enters the sandbox netns and connects via
# `nc 127.0.0.1 <port>`. A dev server that binds to localhost / ::1 only
# (Next.js 13.5+ default) is unreachable even though the process is alive,
# and the readiness probe will time out.
#
# Warren injects HOST=0.0.0.0, HOSTNAME=0.0.0.0, and PORT=<this port> into
# every preview sidecar. That fixes CRA and most Express-style servers
# automatically, but several CLIs ignore env vars and only honor a flag.
# Pick the right knob for your framework:
#
#   Framework            | How to bind to 0.0.0.0
#   ---------------------|------------------------------------------------
#   Next.js (next dev)   | -H 0.0.0.0   (env IGNORED; flag required)
#   Vite                 | --host 0.0.0.0  (or vite.config server.host)
#   create-react-app     | HOST env (already injected; nothing to do)
#   webpack-dev-server   | --host 0.0.0.0  (or devServer.host)
#   Parcel               | --host 0.0.0.0
#   Express / custom     | whatever your code reads (HOST/HOSTNAME/PORT)
#
# To override the injected env vars, prefix them on the command — sh -c
# means inline assignments win:
#
#   command: HOST=10.0.0.1 PORT=8080 pnpm dev

# type: server              # discriminator; V1 only implements 'server'.
#                           # 'static' parses but launcher rejects with
#                           # a not-yet-implemented error (deferred).
# mode: path                # 'path' | 'subdomain'. Optional per-project pin
#                           # of routing mode. WARREN_PREVIEW_MODE env wins
#                           # on conflict. Default when neither set: path.
# command: bun run dev      # required — shell command the sandbox runs
# setup: pnpm install       # optional — runs once before `command` as its own
#                           # sidecar. Non-zero exit fails the preview before
#                           # the dev server is attempted; stderr tail is
#                           # captured into preview_failure_message with
#                           # reason=setup_failed. Skip when the command
#                           # already chains install + dev itself.
# setup_timeout: 5m         # optional — duration, 1s..1h, default 5m. Sized
#                           # for cold pnpm/npm installs. A hang past this
#                           # surfaces as reason=setup_timeout (distinct from
#                           # readiness_timeout, which covers dev-server bind).
# port: 3000                # required — int 1..65535. Privileged ports ok;
#                           # the sandbox is unprivileged-by-namespace.
# readiness_path: /healthz  # optional; must start with '/'. Launcher probes
#                           # this to decide the server is up.
# readiness_timeout: 10m    # optional — cap on how long the launcher waits for
#                           # the first 2xx from readiness_path. Default 10m,
#                           # bound 1s..1h. Sized for cold *bundler* first-
#                           # compile (Next.js / Vite / SvelteKit on a
#                           # moderately large app commonly takes 5-8 min);
#                           # install lives under `setup_timeout` instead.
#                           # The probe returns on first 2xx so a larger
#                           # ceiling only delays failure reporting. As of
#                           # warren-9b15 the deadline starts at first successful
#                           # TCP connect (phase 2), not sidecar create — sidecar
#                           # startup + port bind live under `connect_timeout`.
# connect_timeout: 5m       # optional — phase-1 "did anything bind on the
#                           # port?" budget (warren-9b15). Covers shell pre-exec,
#                           # dev-server CLI startup, dependency import-graph
#                           # load, and bind — i.e. sidecar startup variance.
#                           # Default 5m, bound 1s..1h. A hang past this surfaces
#                           # as reason=connect_timeout (distinct from
#                           # readiness_timeout). The first HTTP response the
#                           # server returns — even 4xx/5xx while the bundler
#                           # still compiles — flips the loop into phase 2.
# idle_ttl: 30m             # optional — kill after this much idle time.
#                           # Format: one or more <number><unit> pairs,
#                           # units ms|s|m|h|d (e.g. "30m", "1h30m").
# max_lifetime: 8h          # optional — hard ceiling regardless of activity.
